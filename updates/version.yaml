1.0.0:
    - "Initialize GoogleReviews plugin: Places API (New) weekly fetch, English-translated reviews, Lovata.Toolbox cached read layer, reviewList component with Review/AggregateRating JSON-LD."
    - create_google_reviews_table.php
1.0.1:
    - "Move backend settings into the Frontend category."
1.0.2:
    - "Place backend settings inside October's built-in CMS/Frontend settings group (SettingsManager::CATEGORY_CMS) and document Git-based install (plugin:install --from) in the README."
1.0.3:
    - "Encrypt the API key at rest (Encryptable) and mask it with the sensitive field type; add a backend live-preview widget (rating, stars, review cards) with a manual AJAX Fetch-now button; extract the shared ReviewFetcher service used by the console command and the preview."
1.0.4:
    - "Fix API key decryption: SettingsModel::get() bypasses the model accessor, so getApiKey() now decrypts the Encryptable-stored value explicitly (with a legacy-plaintext fallback). Adds Settings encryption round-trip tests."
1.0.5:
    - "Fix backend settings 500: rename the FormWidgets directory to lowercase (formwidgets) so October autoloads the ReviewPreview widget, and reference the correct FormField::NO_SAVE_DATA constant."
1.0.6:
    - "Frontend styling + layouts: the reviewList component now ships restyleable CSS (all --gr-* custom properties) and three selectable styles — grid, list and a vanilla-JS scroll-snap slider (arrows, dots, optional autoplay/shuffle, reduced-motion aware, progressive enhancement). Adds order (best/newest/relevance), overall-rating summary, heading/eyebrow, and registers the component as a RainLab.Pages snippet. Assets can be disabled to fully self-style."
